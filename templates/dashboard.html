<!DOCTYPE html>
<html>
<head>
    <title>Smart Home Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Smart Home Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total Rooms</h5>
                    <h2>{{ total_rooms }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Total Devices</h5>
                    <h2>{{ total_devices }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Devices ON</h5>
                    <h2>{{ devices_on }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5>Devices OFF</h5>
                    <h2>{{ devices_off }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
